<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>致 李欣语</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #fbc2eb 0%, #a18cd1 50%, #fbc2eb 100%);
  background-size: 400% 400%;
  animation: gradientShift 8s ease infinite;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow-x: hidden;
  padding: 20px;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.hearts-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.heart-float {
  position: absolute;
  opacity: 0;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 32px 24px 36px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  text-align: center;
  border: 1px solid rgba(255,255,255,0.4);
  animation: cardIn 1s ease-out;
}

@keyframes cardIn {
  0% { opacity: 0; transform: scale(0.85) translateY(40px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

.photo-wrapper {
  width: 180px; height: 180px;
  margin: 0 auto 20px;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid rgba(255,255,255,0.6);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  transition: transform 0.4s ease;
}

.photo-wrapper:hover {
  transform: scale(1.05);
}

.photo-wrapper img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.name {
  font-size: 28px;
  color: #fff;
  font-weight: bold;
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  margin-bottom: 4px;
}

.subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.confession {
  font-size: 14px;
  line-height: 1.8;
  color: rgba(255,255,255,0.92);
  margin-bottom: 24px;
  padding: 0 8px;
}

.confession .highlight {
  color: #fff;
  font-weight: bold;
  font-size: 16px;
}

.heart-icon {
  font-size: 48px;
  margin-bottom: 12px;
  animation: heartbeat 1.4s ease-in-out infinite;
  display: inline-block;
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  14% { transform: scale(1.25); }
  28% { transform: scale(1); }
  42% { transform: scale(1.25); }
  70% { transform: scale(1); }
}

.btn {
  display: inline-block;
  padding: 14px 48px;
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #ff758c 0%, #ff6b6b 100%);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(255,107,107,0.4);
  transition: all 0.3s ease;
  letter-spacing: 2px;
  -webkit-tap-highlight-color: transparent;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(255,107,107,0.5);
}

.btn:active {
  transform: scale(0.96);
}

.burst-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
}

.burst-heart {
  position: absolute;
  font-size: 32px;
  animation: burst 1.8s ease-out forwards;
}

@keyframes burst {
  0% { opacity: 1; transform: translate(0,0) scale(0.5); }
  100% { opacity: 0; transform: var(--target) scale(1.2); }
}

.msg-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 20px;
}

.msg-overlay.show {
  display: flex;
}

.msg-box {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 36px 28px;
  max-width: 360px;
  text-align: center;
  animation: popIn 0.5s ease-out;
}

@keyframes popIn {
  0% { opacity: 0; transform: scale(0.7); }
  100% { opacity: 1; transform: scale(1); }
}

.msg-box .big-heart {
  font-size: 64px;
  margin-bottom: 12px;
}

.msg-box h2 {
  font-size: 22px;
  color: #ff6b6b;
  margin-bottom: 8px;
}

.msg-box p {
  font-size: 14px;
  color: #666;
  line-height: 1.6;
}

.msg-box .close-btn {
  margin-top: 20px;
  padding: 10px 36px;
  font-size: 15px;
  color: #fff;
  background: linear-gradient(135deg, #ff758c, #ff6b6b);
  border: none;
  border-radius: 50px;
  cursor: pointer;
}

/* Floating music button */
.music-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 300;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ff758c, #ff6b6b);
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,107,107,0.4);
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

.music-btn:hover {
  transform: scale(1.1);
}

.music-btn.playing {
  animation: musicPulse 1.5s ease-in-out infinite;
}

@keyframes musicPulse {
  0%, 100% { box-shadow: 0 4px 16px rgba(255,107,107,0.4); }
  50% { box-shadow: 0 4px 32px rgba(255,107,107,0.7); }
}

</style>
</head>

  <div class="name">李欣语</div>
  <div class="subtitle">&#x2764; 非常幸运能够遇见你 &#x2764;</div>
  <div class="confession">
    从见到你的第一眼起，<br>
    我的心就被你牢牢抓住了。<br><br>
    你的笑容，是我每天最想看到的风景。<br>
    你的声音，是我听过最动听的旋律。<br><br>
    <span class="highlight">李欣语，我喜欢你！</span><br><br>
    和我在一起一辈子好吗
  </div>
  <button class="btn" id="yesBtn">&#x1F495; 我同意</button>
</div>

<div class="burst-container" id="burstContainer"></div>

<div class="msg-overlay" id="msgOverlay">
  <div class="msg-box">
    <div class="big-heart">&#x1F496;</div>
    <h2>520快乐宝宝！&#x2764;&#xFE0F;</h2>
    <p>
        李欣语<br>
      我会一直陪在你身边，<br>
      
      你是我最重要的人 &#x1F495;
    </p>
    <button class="close-btn" id="closeBtn">我也喜欢你 &#x1F495;</button>
  </div>
</div>

<button class="music-btn" id="musicBtn" title="播放/暂停">&#x1F3B5;</button>
<audio id="bgMusic"></audio>

<script>
const heartsBg = document.getElementById('heartsBg');
const heartSymbols = ['❤️', '💕', '💗', '💖', '🩷', '💝'];

for (let i = 0; i < 20; i++) {
  const el = document.createElement('div');
  el.className = 'heart-float';
  el.textContent = heartSymbols[i % heartSymbols.length];
  el.style.left = Math.random() * 100 + '%';
  el.style.fontSize = (14 + Math.random() * 18) + 'px';
  el.style.animationDelay = (Math.random() * 6) + 's';
  el.style.animationDuration = (5 + Math.random() * 4) + 's';
  heartsBg.appendChild(el);
}

document.getElementById('yesBtn').addEventListener('click', function() {
  const container = document.getElementById('burstContainer');
  const symbols = ['❤️', '💕', '💗', '💖', '🩷', '💝', '🌹', '🌸'];

  // Start music when user clicks 答应我
  const bgMusic = document.getElementById('bgMusic');
  const mb = document.getElementById('musicBtn');
  if (!bgMusic.src) {
    bgMusic.src = 'https://api.injahow.cn/meting/?type=url&id=234014&server=netease';
  }
  bgMusic.play().then(function() {
    mb.classList.add('playing');
  }).catch(function(e) {
    console.log('Audio play failed:', e);
  });

  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'burst-heart';
    el.textContent = symbols[i % symbols.length];
    const angle = (Math.PI * 2 * i) / 40;
    const dist = 120 + Math.random() * 200;
    const x = Math.cos(angle) * dist;
    const y = Math.sin(angle) * dist;
    el.style.setProperty('--target', `translate(${x}px, ${y}px)`);
    el.style.left = '50%';
    el.style.top = '50%';
    el.style.fontSize = (18 + Math.random() * 28) + 'px';
    el.style.animationDelay = (Math.random() * 0.3) + 's';
    container.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }

  setTimeout(() => {
    document.getElementById('msgOverlay').classList.add('show');
  }, 800);
});

document.getElementById('closeBtn').addEventListener('click', function() {
  document.getElementById('msgOverlay').classList.remove('show');
});

// Music player button
const bgMusic = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', function() {
  if (!bgMusic.src) {
    bgMusic.src = 'https://api.injahow.cn/meting/?type=url&id=234014&server=netease';
  }
  if (bgMusic.paused) {
    bgMusic.play().then(function() {
      musicBtn.classList.add('playing');
    }).catch(function(e) {
      console.log('Audio play failed:', e);
    });
  } else {
    bgMusic.pause();
    musicBtn.classList.remove('playing');
  }
});
</script>
